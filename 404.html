<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | Ornest Developers</title>
  <meta name="description" content="The page you are looking for does not exist. Return to Ornest Developers.">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 70%, #1a1a2e 100%);
      color: #fff;
    }
    .error-page h1 {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -3px;
      line-height: 1;
      color: #e94560;
      margin-bottom: 8px;
    }
    .error-page p {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
      max-width: 440px;
    }
    .error-page .logo {
      margin-bottom: 24px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <a class="logo" href="./" aria-label="Ornest Developers home">
      <img class="logo-mark" src="logo.png" alt="Ornest Developers logo" style="width:54px;height:54px">
      Ornest Developers
    </a>
    <h1>404</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="./" class="btn btn-primary">Back to Home</a>
  </div>
</body>
</html>
